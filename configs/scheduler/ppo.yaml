scheduler_name: ppo
device: auto
network:
  hidden_dims: [128, 128]
ppo:
  total_timesteps: 160000
  n_envs: 4
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_hidden_dims: [128, 128]
  normalize_observations: true
  normalize_reward: true
  clip_obs: 10.0
  clip_reward: 10.0
  use_sde: true
  sde_sample_freq: 4
  eval_interval_episodes: 5
  eval_episodes: 3
  verbose: 0

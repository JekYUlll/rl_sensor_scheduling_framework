scheduler_name: ppo
device: cpu
network:
  hidden_dims: [128, 128]
ppo:
  learning_rate: 0.0003
  n_steps: 256
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_hidden_dims: [128, 128]
  eval_interval_episodes: 5
  eval_episodes: 3
  verbose: 0

seed: 42
data:
  reward_pretrain_ratio: 0.2
  rl_train_ratio: 0.5
  rl_val_ratio: 0.15
  rl_test_ratio: 0.15
run:
  episode_len: 400
  num_episodes: 80
  eval_episodes: 10
  max_steps: 400
  save_every: 10
cost:
  alpha_estimation: 0.02
  beta_prediction: 0.0
  beta_forecast: 5.0
  lambda_power: 0.0
  eta_switch: 0.005
  rho_coverage: 2.0
  uncertainty_metric: weighted_trace_P_norm
  reward_target_columns: [snow_mass_flux_kg_m2_s]
  min_relevance_weight: 0.25
  relevance_power: 1.0
forecast_reward:
  enabled: true
constraints:
  max_active: 5
  per_step_budget: 2.2
  min_coverage_ratio: 0.25
logging:
  level: INFO

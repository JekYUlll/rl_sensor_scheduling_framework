<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1600" viewBox="0 0 2200 1600">
  <defs>
    <style>
      .title { font: 700 36px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .laneTitle { font: 700 18px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .section { font: 700 18px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .body { font: 500 13px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1e293b; }
      .small { font: 500 12px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .mono { font: 600 12px 'JetBrains Mono', 'Consolas', monospace; fill: #334155; }
      .chip { font: 700 12px 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .box { rx: 20; ry: 20; stroke-width: 2.1; }
      .lane { rx: 26; ry: 26; stroke-width: 1.2; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrowSoft { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrowheadSoft); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="2200" height="1600" fill="#f8fafc"/>
  <rect x="0" y="0" width="2200" height="145" fill="#eef2ff"/>
  <text x="60" y="64" class="title">风吹雪传感器调度主线图：Route A 当前完整实验框架（context-aware 奖励版本）</text>
  <text x="60" y="96" class="subtitle">唯一主线：先生成共享真值，再在 predictor_pretrain 段预训练并冻结预测奖励模型；随后在 rl_train / rl_val 上训练与选模调度器，最后只在 final_test 上统一评估与出图。</text>
  <text x="60" y="122" class="subtitle">当前默认长实验入口：scripts/run_full_experiment_tmux.sh --reward-cfg configs/reward/lstm_aux_context.yaml</text>

  <rect x="1640" y="30" width="150" height="34" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1674" y="52" class="chip">蓝色：数据与配置</text>
  <rect x="1810" y="30" width="150" height="34" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1844" y="52" class="chip">橙色：冻结奖励</text>
  <rect x="1980" y="30" width="150" height="34" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="2014" y="52" class="chip">紫色：调度学习</text>

  <rect x="40" y="160" width="2120" height="280" class="lane" fill="#f9fbff" stroke="#cbd5e1"/>
  <text x="65" y="188" class="laneTitle">A. 数据、物理环境与约束定义</text>

  <rect x="60" y="200" width="490" height="210" class="box" fill="#eef6ff" stroke="#3b82f6" filter="url(#shadow)"/>
  <text x="86" y="228" class="section">1. 共享真值环境生成</text>
  <text x="86" y="252" class="mono">脚本：00_generate_business_data.py</text>
  <text x="86" y="276" class="body">
    <tspan x="86" dy="0">时间分辨率：1 Hz；总长度：1,209,600 步 = 14 天。</tspan>
    <tspan x="86" dy="20">状态维度共 10 个：风速、风向、气温、相对湿度、气压、辐射、</tspan>
    <tspan x="86" dy="20">雪表温度、雪粒粒径、雪粒速度、雪通量。</tspan>
    <tspan x="86" dy="20">事件定义：雪通量高于 0.9 分位数时标记为事件时段。</tspan>
    <tspan x="86" dy="20">输出文件：data/generated/windblown_truth.csv</tspan>
  </text>

  <rect x="580" y="200" width="490" height="210" class="box" fill="#eefcf5" stroke="#22c55e" filter="url(#shadow)"/>
  <text x="606" y="228" class="section">2. 传感器层与功率成本</text>
  <text x="606" y="252" class="body">
    <tspan x="606" dy="0">met_station：风速/风向/气温/湿度/气压，稳态 0.12，启动峰值 0.16</tspan>
    <tspan x="606" dy="20">radiation：辐射，稳态 0.05，启动峰值 0.07</tspan>
    <tspan x="606" dy="20">surface_temp_ir：雪表温度，稳态 0.05，启动峰值 0.08</tspan>
    <tspan x="606" dy="20">laser_disdrometer：粒径/粒速，稳态 1.35，启动峰值 1.75</tspan>
    <tspan x="606" dy="20">fc4_flux：雪通量，稳态 1.55，启动峰值 1.95</tspan>
    <tspan x="606" dy="20">所有传感器刷新间隔均为 1 秒，并带各自观测噪声。</tspan>
  </text>

  <rect x="1100" y="200" width="490" height="210" class="box" fill="#f4f9ff" stroke="#0ea5e9" filter="url(#shadow)"/>
  <text x="1126" y="228" class="section">3. 时间切分与防泄漏规则</text>
  <text x="1126" y="252" class="body">
    <tspan x="1126" dy="0">predictor_pretrain：35% = 423,360 步，约 4.9 天</tspan>
    <tspan x="1126" dy="20">rl_train：50% = 604,800 步，约 7.0 天</tspan>
    <tspan x="1126" dy="20">rl_val：7.5% = 90,720 步，约 1.05 天</tspan>
    <tspan x="1126" dy="20">final_test：7.5% = 90,720 步，约 1.05 天</tspan>
    <tspan x="1126" dy="20">估计器统计量仅在 predictor_pretrain 段拟合；四段严格不重叠。</tspan>
    <tspan x="1126" dy="20">final_test 只用于最终报告，不回流训练和选模。</tspan>
  </text>

  <rect x="1620" y="200" width="520" height="210" class="box" fill="#fdf4ff" stroke="#a855f7" filter="url(#shadow)"/>
  <text x="1646" y="228" class="section">4. 当前调度候选与统一约束口径</text>
  <text x="1646" y="252" class="body">
    <tspan x="1646" dy="0">规则基线：full_open、random、periodic、round_robin、info_priority</tspan>
    <tspan x="1646" dy="20">学习型：dqn、cmdp_dqn、ppo</tspan>
    <tspan x="1646" dy="20">统一动作语义：先输出每个传感器的重要性排序，再由可行子集投影器执行。</tspan>
    <tspan x="1646" dy="20">瞬时稳态功率预算：2.2；启动峰值预算：2.3；安全裕度：0.05</tspan>
    <tspan x="1646" dy="20">长期约束：平均功率预算 1.6；单 episode 能量预算 819.2</tspan>
    <tspan x="1646" dy="20">最大激活传感器数：5</tspan>
  </text>

  <rect x="40" y="470" width="2120" height="300" class="lane" fill="#fffdf8" stroke="#cbd5e1"/>
  <text x="65" y="498" class="laneTitle">B. predictor_pretrain 段上的冻结预测奖励模型预训练</text>

  <rect x="60" y="510" width="490" height="230" class="box" fill="#fff7ed" stroke="#f59e0b" filter="url(#shadow)"/>
  <text x="86" y="538" class="section">5. 奖励模型预训练数据收集</text>
  <text x="86" y="562" class="mono">脚本：00b_pretrain_reward_predictor.py</text>
  <text x="86" y="586" class="body">
    <tspan x="86" dy="0">只允许使用 predictor_pretrain 段，避免和 RL 训练/验证/测试混用。</tspan>
    <tspan x="86" dy="20">调度器混合来源：full_open、periodic、round_robin、info_priority、random。</tspan>
    <tspan x="86" dy="20">每个预训练调度器采样 16 条 rollout；每条 rollout 长度 4096 步。</tspan>
    <tspan x="86" dy="20">额外加入最多 64 个常量可行子集 rollout，与 32 个随机切换子集 rollout。</tspan>
    <tspan x="86" dy="20">随机切换保持时长范围：1 到 8 步；允许随机 reset，提高覆盖度。</tspan>
  </text>

  <rect x="580" y="510" width="490" height="230" class="box" fill="#fffaf0" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="606" y="538" class="section">6. 统一时序输入构造</text>
  <text x="606" y="562" class="mono">模块：forecasting/input_augmentation.py</text>
  <text x="606" y="586" class="body">
    <tspan x="606" dy="0">基础输入：估计器输出的 10 维状态序列。</tspan>
    <tspan x="606" dy="20">物理派生特征：风向正余弦、风矢量 u/v、表面-空气温差、</tspan>
    <tspan x="606" dy="20">粒子动能代理、粒径-粒速交互项、输运超阈值、昼夜相位正余弦。</tspan>
    <tspan x="606" dy="20">缺测感知特征：每个变量的“本步是否观测到”与“距离上次观测的步数”。</tspan>
    <tspan x="606" dy="20">当前 context-aware 额外特征：总不确定度 trace_p 及其 log(1+trace_p)。</tspan>
    <tspan x="606" dy="20">当前版本不再把功率或峰值功率直接喂给预测器。</tspan>
  </text>

  <rect x="1100" y="510" width="490" height="230" class="box" fill="#fff8eb" stroke="#d97706" filter="url(#shadow)"/>
  <text x="1126" y="538" class="section">7. 冻结预测奖励模型集成</text>
  <text x="1126" y="562" class="mono">配置：configs/reward/lstm_aux_context.yaml</text>
  <text x="1126" y="586" class="body">
    <tspan x="1126" dy="0">模型族：TCN、LSTM、Transformer；权重分别为 0.3333、0.3333、0.3334。</tspan>
    <tspan x="1126" dy="20">历史窗口长度：20 步；预测 horizon：3 步。</tspan>
    <tspan x="1126" dy="20">三个 horizon 的加权系数：1.0、0.8、0.6。</tspan>
    <tspan x="1126" dy="20">损失函数：Huber，delta = 1.0。</tspan>
    <tspan x="1126" dy="20">目标变量共 7 个：气温、雪表温度、风速、风向正余弦、雪通量、雪粒速度。</tspan>
    <tspan x="1126" dy="20">输出工件：reports/runs/&lt;run_tag&gt;_reward_model/reward_oracles.yaml 及三个 .pt 文件。</tspan>
  </text>

  <rect x="1620" y="510" width="520" height="230" class="box" fill="#fff7f0" stroke="#ea580c" filter="url(#shadow)"/>
  <text x="1646" y="538" class="section">8. 奖励如何进入 RL</text>
  <text x="1646" y="562" class="body">
    <tspan x="1646" dy="0">每一步都用最近 20 步估计状态窗口，预测未来 3 步目标变量。</tspan>
    <tspan x="1646" dy="20">输入给奖励模型的不只是估计状态，还包括观测掩码、绝对时间索引、</tspan>
    <tspan x="1646" dy="20">以及上面提到的 uncertainty-only context 特征。</tspan>
    <tspan x="1646" dy="20">奖励主项是“未来预测误差的相反数”；奖励模型参数在 RL 中完全冻结。</tspan>
    <tspan x="1646" dy="20">当前主线不做 scheduler 与 predictor 的联动重训练，也不是 bilevel 优化。</tspan>
    <tspan x="1646" dy="20">冻结模型只负责打分，不负责在 RL 阶段更新参数。</tspan>
  </text>

  <rect x="40" y="780" width="2120" height="300" class="lane" fill="#fbf9ff" stroke="#cbd5e1"/>
  <text x="65" y="808" class="laneTitle">C. rl_train / rl_val 段上的调度学习、验证与 checkpoint 选择</text>

  <rect x="60" y="820" width="490" height="230" class="box" fill="#f5f3ff" stroke="#8b5cf6" filter="url(#shadow)"/>
  <text x="86" y="848" class="section">9. 训练环境闭环</text>
  <text x="86" y="872" class="mono">核心：truth_replay_env + dataset_sensor + kalman_filter</text>
  <text x="86" y="896" class="body">
    <tspan x="86" dy="0">环境从共享真值轨迹回放带噪观测；估计器先预测，再用当前可用观测更新。</tspan>
    <tspan x="86" dy="20">RL 状态包括：当前估计状态、协方差对角线、总不确定度、传感器新鲜度、</tspan>
    <tspan x="86" dy="20">覆盖率、预算比、上一步动作、事件标记、昼夜相位。</tspan>
    <tspan x="86" dy="20">reward_target_columns 当前用于状态相关摘要的权重口径。</tspan>
    <tspan x="86" dy="20">forecast_target_columns 才是最终预测任务真正评估的目标集。</tspan>
  </text>

  <rect x="580" y="820" width="490" height="230" class="box" fill="#f5f3ff" stroke="#7c3aed" filter="url(#shadow)"/>
  <text x="606" y="848" class="section">10. 可行子集投影与即时奖励</text>
  <text x="606" y="872" class="mono">核心：OnlineSubsetProjector + mainline_reward.py</text>
  <text x="606" y="896" class="body">
    <tspan x="606" dy="0">所有策略先输出每个传感器的排序或打分，再投影成当前可执行子集。</tspan>
    <tspan x="606" dy="20">投影阶段强制满足：瞬时稳态功率、启动峰值功率、安全裕度、最大激活数。</tspan>
    <tspan x="606" dy="20">即时奖励由四部分组成：未来预测误差主项、切换代价、覆盖率不足惩罚、</tspan>
    <tspan x="606" dy="20">约束违约惩罚。</tspan>
    <tspan x="606" dy="20">状态跟踪误差项当前关闭：lambda_state_tracking = 0.0。</tspan>
  </text>

  <rect x="1100" y="820" width="490" height="230" class="box" fill="#f5f3ff" stroke="#6d28d9" filter="url(#shadow)"/>
  <text x="1126" y="848" class="section">11. 调度器训练与验证</text>
  <text x="1126" y="872" class="body">
    <tspan x="1126" dy="0">规则基线只做 rollout 统计，不更新参数。</tspan>
    <tspan x="1126" dy="20">DQN / CMDP-DQN：默认 120 个 episode，每个 episode 512 步，每 10 个 episode 保存一次。</tspan>
    <tspan x="1126" dy="20">CMDP-DQN 额外追踪平均功率和总能量的长期约束。</tspan>
    <tspan x="1126" dy="20">PPO：输出连续传感器得分；当前版本也走同一条 context-aware 奖励路径；设备为 auto。</tspan>
    <tspan x="1126" dy="20">rl_train 用于学习；rl_val 用于 checkpoint 选择；checkpoint 不从 final_test 反推。</tspan>
  </text>

  <rect x="1620" y="820" width="520" height="230" class="box" fill="#faf5ff" stroke="#9333ea" filter="url(#shadow)"/>
  <text x="1646" y="848" class="section">12. 每个调度器的直接产物</text>
  <text x="1646" y="872" class="body">
    <tspan x="1646" dy="0">目录：reports/runs/&lt;run_tag&gt;_&lt;scheduler&gt;/</tspan>
    <tspan x="1646" dy="20">规则基线：metrics_estimation.csv、metrics_estimation_eval.csv、dataset_stats.csv</tspan>
    <tspan x="1646" dy="20">DQN / CMDP-DQN：scheduler_*.pt、scheduler_*_last.pt、training_log.csv</tspan>
    <tspan x="1646" dy="20">PPO：scheduler_ppo.zip、scheduler_ppo_last.zip、归一化统计、training_log.csv</tspan>
    <tspan x="1646" dy="20">所有调度器都会继续进入 final_test 回放与统一 forecasting 评估。</tspan>
    <tspan x="1646" dy="20">当前长实验通过 tmux 启动，避免前台中断。</tspan>
  </text>

  <rect x="40" y="1090" width="2120" height="300" class="lane" fill="#f7fcf8" stroke="#cbd5e1"/>
  <text x="65" y="1118" class="laneTitle">D. final_test 回放、统一 frozen predictor 评估、聚合与论文图表</text>

  <rect x="60" y="1130" width="490" height="230" class="box" fill="#eefbf3" stroke="#16a34a" filter="url(#shadow)"/>
  <text x="86" y="1158" class="section">13. final_test 回放与数据集导出</text>
  <text x="86" y="1182" class="mono">脚本：02_evaluate_scheduler.py + 03_build_forecast_dataset.py</text>
  <text x="86" y="1206" class="body">
    <tspan x="86" dy="0">固定训练完成的调度器，只在 final_test 段回放一次。</tspan>
    <tspan x="86" dy="20">导出的 NPZ 包含：估计状态序列、真值目标序列、观测掩码、事件标记、</tspan>
    <tspan x="86" dy="20">稳态功率、峰值功率、总不确定度轨迹、绝对时间索引、特征名。</tspan>
    <tspan x="86" dy="20">数据路径：data/processed/&lt;run_tag&gt;_&lt;scheduler&gt;.npz</tspan>
    <tspan x="86" dy="20">这些数据集是后续所有 forecasting 评估、时间线图和曲线图的统一输入。</tspan>
  </text>

  <rect x="580" y="1130" width="490" height="230" class="box" fill="#f0fdf4" stroke="#15803d" filter="url(#shadow)"/>
  <text x="606" y="1158" class="section">14. 统一 frozen predictor 评估</text>
  <text x="606" y="1182" class="mono">脚本：04_eval_frozen_predictors.py / 04_eval_frozen_predictors_multi_gpu.sh</text>
  <text x="606" y="1206" class="body">
    <tspan x="606" dy="0">对每个调度器数据集，统一加载同一套 frozen predictor family。</tspan>
    <tspan x="606" dy="20">默认矩阵：8 个调度器 × 3 个模型 = 24 个组合。</tspan>
    <tspan x="606" dy="20">输出每个组合的 metrics_forecast.csv 和 forecast_predictions.npz。</tspan>
    <tspan x="606" dy="20">当前主线是“统一冻结评估”，不是“为每个调度器分别重训 predictor”。</tspan>
    <tspan x="606" dy="20">这一步是比较调度策略的公共评价器，而不是二次训练流程。</tspan>
  </text>

  <rect x="1100" y="1130" width="490" height="230" class="box" fill="#ecfdf5" stroke="#22c55e" filter="url(#shadow)"/>
  <text x="1126" y="1158" class="section">15. 聚合指标、相对 full_open 对比、任务聚焦分析</text>
  <text x="1126" y="1182" class="mono">脚本：05_evaluate_forecasts.py + 06_posthoc_analysis.py + 10_posthoc_task_focus.py</text>
  <text x="1126" y="1206" class="body">
    <tspan x="1126" dy="0">基础误差：RMSE、MAE、MAPE、sMAPE。</tspan>
    <tspan x="1126" dy="20">形状与相关性：DTW(H=1)、Pearson(H=1)。</tspan>
    <tspan x="1126" dy="20">资源指标：平均功率、总能量、峰值违约率、相对 full_open 的节电率。</tspan>
    <tspan x="1126" dy="20">聚合表：metrics_forecast_all_&lt;run_tag&gt;.csv、comparison.csv、scheduler_summary.csv。</tspan>
    <tspan x="1126" dy="20">任务聚焦版本只统计环境配置中定义的主任务目标变量。</tspan>
  </text>

  <rect x="1620" y="1130" width="520" height="230" class="box" fill="#fefce8" stroke="#ca8a04" filter="url(#shadow)"/>
  <text x="1646" y="1158" class="section">16. 最终图表与工件落盘</text>
  <text x="1646" y="1182" class="mono">脚本：09_generate_all_plots.py + 11_plot_rl_training_diagnostics.py + 13_plot_legacy_style_summaries.py</text>
  <text x="1646" y="1206" class="body">
    <tspan x="1646" dy="0">输出图：预测曲线叠加图、传感器激活时间线、功率-误差权衡图、</tspan>
    <tspan x="1646" dy="20">RMSE / DTW 对比热图、排名相关图、RL 训练诊断图、legacy 风格汇总图。</tspan>
    <tspan x="1646" dy="20">聚合目录：reports/aggregate/posthoc_&lt;run_tag&gt;/</tspan>
    <tspan x="1646" dy="20">最终报告口径：只引用 final_test 段的 forecasting 表现和约束表现。</tspan>
    <tspan x="1646" dy="20">训练段和验证段只能解释学习过程，不能作为论文最终效果表格。</tspan>
  </text>


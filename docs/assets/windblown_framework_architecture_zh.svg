  <text x="886" y="758" class="small">冻结奖励模型只提供打分，不在调度训练中回传参数更新。</text>

  <path d="M300 1130 L300 1090 L1470 1090 L1470 1058" class="arrowSoft"/>
  <text x="326" y="1112" class="small">final_test 产物仅用于最终统一评估，不回流到 rl_train 或 rl_val。</text>

  <rect x="40" y="1435" width="2120" height="110" rx="18" fill="#e2e8f0"/>
  <text x="68" y="1470" class="section">主线原则与当前解释边界</text>
  <text x="68" y="1498" class="body">
    <tspan x="68" dy="0">1. 先冻结奖励模型，再训练调度器；调度器优化的是未来 3 步预测误差，而不是即时状态跟踪误差。</tspan>
    <tspan x="68" dy="20">2. 所有 scheduler 都在同一条共享真值轨迹上训练、验证、测试；唯一允许引用最终效果的分段是 final_test。</tspan>
    <tspan x="68" dy="20">3. 当前 context-aware 版本只把“总不确定度及其对数变换”作为额外上下文输入，不把功率值直接注入预测器。</tspan>
    <tspan x="68" dy="20">4. full_open 是统一比较基线，但在当前 frozen predictor 评估口径下，不自动等于理论最优上界；结果解释必须结合防泄漏设计与模型泛化边界。</tspan>
  </text>
</svg>

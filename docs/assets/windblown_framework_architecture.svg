<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 11px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .box { rx: 20; ry: 20; stroke-width: 2.2; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f8fafc"/>
  <text x="70" y="70" class="title">Power-Constrained Sensor Scheduling + State Estimation + Forecasting Framework</text>
  <text x="70" y="102" class="subtitle">Windblown microclimate digital twin pipeline for Antarctic single-point laboratory replication</text>

  <!-- Row 1 -->
  <rect x="70" y="150" width="300" height="165" class="box" fill="#eef6ff" stroke="#3b82f6" filter="url(#shadow)"/>
  <text x="110" y="182" class="section">1. Shared Truth Environment</text>
  <rect x="95" y="210" width="52" height="62" rx="10" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <polyline points="129,210 147,228 147,272" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <polyline points="129,210 129,228 147,228" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="225" class="label">Truth generator</text>
  <text x="165" y="246" class="small">`00_generate_business_data.py`</text>
  <text x="165" y="269" class="small">Output: `windblown_truth.csv`</text>
  <text x="95" y="295" class="tiny">Latent/observed state includes wind, temperature, humidity, pressure,</text>
  <text x="95" y="311" class="tiny">radiation, surface temperature, particle size/velocity, and snow flux.</text>

  <rect x="410" y="150" width="330" height="165" class="box" fill="#effcf5" stroke="#22c55e" filter="url(#shadow)"/>
  <text x="450" y="182" class="section">2. Sensor Bank + Physical Limits</text>
  <circle cx="450" cy="230" r="18" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <line x1="450" y1="212" x2="450" y2="248" stroke="#16a34a" stroke-width="2"/>
  <line x1="432" y1="230" x2="468" y2="230" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="220" class="label">Sensors</text>
  <text x="480" y="240" class="small">met station, radiation, surface-temp IR,</text>
  <text x="480" y="258" class="small">laser disdrometer, FC4 snow-flux</text>
  <text x="450" y="292" class="tiny">Hard constraints: instantaneous power, startup peak, safety margin.</text>
  <text x="450" y="308" class="tiny">Long-horizon constraints: average power / energy budget (CMDP).</text>

  <rect x="780" y="150" width="360" height="165" class="box" fill="#fff6ea" stroke="#f59e0b" filter="url(#shadow)"/>
  <text x="820" y="182" class="section">3. Scheduler Layer</text>
  <rect x="810" y="207" width="95" height="34" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="827" y="229" class="small">random</text>
  <rect x="915" y="207" width="95" height="34" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="928" y="229" class="small">periodic</text>
  <rect x="1020" y="207" width="95" height="34" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="1028" y="229" class="small">round-robin</text>
  <rect x="810" y="252" width="95" height="34" rx="12" fill="#fed7aa" stroke="#f97316" stroke-width="1.8"/>
  <text x="840" y="274" class="small">DQN</text>
  <rect x="915" y="252" width="95" height="34" rx="12" fill="#fed7aa" stroke="#f97316" stroke-width="1.8"/>
  <text x="932" y="274" class="small">CMDP-DQN</text>
  <rect x="1020" y="252" width="95" height="34" rx="12" fill="#fed7aa" stroke="#f97316" stroke-width="1.8"/>
  <text x="1055" y="274" class="small">PPO</text>
  <text x="810" y="304" class="tiny">All windblown schedulers use the online subset projector.</text>

  <rect x="1180" y="150" width="350" height="165" class="box" fill="#f4f0ff" stroke="#8b5cf6" filter="url(#shadow)"/>
  <text x="1220" y="182" class="section">4. OnlineSubsetProjector</text>
  <rect x="1210" y="205" width="82" height="74" rx="12" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="1235" cy="228" r="8" fill="#8b5cf6"/>
  <circle cx="1267" cy="228" r="8" fill="#8b5cf6"/>
  <circle cx="1235" cy="258" r="8" fill="#8b5cf6"/>
  <circle cx="1267" cy="258" r="8" fill="#8b5cf6"/>
  <text x="1315" y="224" class="label">Input</text>
  <text x="1315" y="244" class="small">sensor scores / rankings</text>
  <text x="1315" y="264" class="small">previous subset</text>
  <text x="1315" y="284" class="small">power constraints</text>
  <text x="1210" y="304" class="tiny">Output: feasible on/off subset for the current time step.</text>

  <!-- Row 2 -->
  <rect x="120" y="390" width="310" height="175" class="box" fill="#eef6ff" stroke="#2563eb" filter="url(#shadow)"/>
  <text x="160" y="422" class="section">5. Sensor Replay + Observation Noise</text>
  <text x="150" y="455" class="label">DatasetSensor</text>
  <text x="150" y="477" class="small">Reads truth columns, applies sensor noise,</text>
  <text x="150" y="495" class="small">availability, startup peaks, and freshness.</text>
  <text x="150" y="528" class="tiny">Artifacts: observed values, on/off masks, power traces.</text>

  <rect x="500" y="390" width="330" height="175" class="box" fill="#effcf5" stroke="#16a34a" filter="url(#shadow)"/>
  <text x="540" y="422" class="section">6. State Estimation</text>
  <rect x="530" y="452" width="120" height="54" rx="12" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="562" y="484" class="label">Kalman Filter</text>
  <rect x="680" y="452" width="120" height="54" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="707" y="484" class="label">State Summary</text>
  <text x="530" y="535" class="tiny">Belief state: x_hat, diag(P), trace(P), freshness, coverage, budget, prev action.</text>

  <rect x="900" y="390" width="300" height="175" class="box" fill="#fff6ea" stroke="#f59e0b" filter="url(#shadow)"/>
  <text x="940" y="422" class="section">7. Scheduler-Specific Dataset</text>
  <text x="930" y="455" class="label">`03_build_forecast_dataset.py`</text>
  <text x="930" y="477" class="small">Exports one NPZ per scheduler:</text>
  <text x="930" y="497" class="small">`input_series`, `target_series`,</text>
  <text x="930" y="515" class="small">`observed_mask`, `power`, `trace_p`</text>
  <text x="930" y="548" class="tiny">This is the interface between scheduling and forecasting.</text>

  <rect x="1270" y="390" width="260" height="175" class="box dashed" fill="#faf5ff" stroke="#a855f7" filter="url(#shadow)"/>
  <text x="1300" y="422" class="section">Optional Reward Oracle</text>
  <text x="1300" y="454" class="label">Scheme A infrastructure</text>
  <text x="1300" y="476" class="small">`00b_pretrain_reward_predictor.py`</text>
  <text x="1300" y="496" class="small">`forecast_reward.py`</text>
  <text x="1300" y="525" class="tiny">Currently disabled by default.</text>
  <text x="1300" y="541" class="tiny">Kept for future constrained / auxiliary reward studies.</text>

  <!-- Row 3 -->
  <rect x="120" y="640" width="470" height="220" class="box" fill="#eef2ff" stroke="#6366f1" filter="url(#shadow)"/>
  <text x="160" y="674" class="section">8. Forecasting Models</text>
  <text x="160" y="705" class="label">Common input</text>
  <text x="160" y="726" class="small">Estimator state + derived physical features</text>
  <text x="160" y="746" class="small">(wind_u, wind_v, dir sin/cos, temp gap, transport exceedance, ...)</text>
  <text x="160" y="779" class="label">Predictor zoo</text>
  <text x="160" y="800" class="small">naive, MLP, LSTM, Transformer, Informer, TCN, PINN, SERT-like, S4M-like</text>
  <text x="160" y="833" class="tiny">Train one predictor on one scheduler-specific dataset, then compare against full_open.</text>

  <rect x="650" y="640" width="420" height="220" class="box" fill="#fff7ed" stroke="#ea580c" filter="url(#shadow)"/>
  <text x="690" y="674" class="section">9. Targets</text>
  <text x="680" y="710" class="label">Primary reward targets</text>
  <text x="680" y="732" class="small">air_temperature_c</text>
  <text x="680" y="752" class="small">snow_surface_temperature_c</text>
  <text x="680" y="772" class="small">wind_speed_ms</text>
  <text x="860" y="710" class="label">Forecast targets</text>
  <text x="860" y="732" class="small">primary targets + wind_dir_sin/cos</text>
  <text x="860" y="752" class="small">snow_mass_flux_kg_m2_s</text>
  <text x="860" y="772" class="small">snow_particle_mean_velocity_ms</text>
  <text x="680" y="823" class="tiny">`solar_radiation_wm2` remains in the input state but is not a forecast target.</text>

  <rect x="1130" y="640" width="400" height="220" class="box" fill="#ecfeff" stroke="#0891b2" filter="url(#shadow)"/>
  <text x="1170" y="674" class="section">10. Evaluation + Reporting</text>
  <text x="1160" y="708" class="label">Aggregate metrics</text>
  <text x="1160" y="730" class="small">RMSE, MAE, sMAPE, Pearson, DTW</text>
  <text x="1160" y="760" class="label">Visualization</text>
  <text x="1160" y="782" class="small">prediction curves, sensor activation timelines,</text>
  <text x="1160" y="800" class="small">power-vs-error plots, rank correlation, task-focus summaries</text>
  <text x="1160" y="832" class="tiny">Goal: retain forecast accuracy under hard power constraints.</text>

  <!-- Arrows -->
  <path d="M370 232 L410 232" class="arrow"/>
  <path d="M740 232 L780 232" class="arrow"/>
  <path d="M1140 232 L1180 232" class="arrow"/>
  <path d="M1260 315 L1260 352 L275 352 L275 390" class="arrow"/>
  <path d="M430 478 L500 478" class="arrow"/>
  <path d="M830 478 L900 478" class="arrow"/>
  <path d="M1050 565 L1050 603 L355 603 L355 640" class="arrow"/>
  <path d="M590 750 L650 750" class="arrow"/>
  <path d="M1070 750 L1130 750" class="arrow"/>

  <!-- Side callout -->
  <rect x="70" y="900" width="1460" height="42" rx="14" fill="#e2e8f0"/>
  <text x="95" y="926" class="small">Main training signal in current default windblown runs: direct primary-target state error + switching cost + coverage penalty. Power is enforced mainly through hard constraints and CMDP cost terms.</text>
</svg>
